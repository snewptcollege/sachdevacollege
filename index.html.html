<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JAI BHIM PRATIBHA VIKAS YOJNA — Student Portal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F2F0EB;--surface:#FFFFFF;--surface2:#F7F5F0;--surface3:#EDE9E1;
  --border:#E0DBD0;--border2:#C8C2B4;
  --text:#1C1917;--text2:#6B6560;--text3:#9C9690;
  --blue:#1D4ED8;--blue-bg:#EFF6FF;--blue-light:#DBEAFE;--blue-dark:#1E3A8A;
  --green:#15803D;--green-bg:#F0FDF4;--green-light:#DCFCE7;
  --amber:#B45309;--amber-bg:#FFFBEB;--amber-light:#FEF3C7;
  --red:#B91C1C;--red-bg:#FEF2F2;--red-light:#FEE2E2;
  --orange:#C2410C;--orange-bg:#FFF7ED;--orange-light:#FFEDD5;
  --purple:#6D28D9;--purple-bg:#F5F3FF;--purple-light:#EDE9FE;
  --teal:#0F766E;--teal-bg:#F0FDFA;--teal-light:#CCFBF1;
  --radius:8px;--radius-lg:14px;--radius-xl:20px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 2px 8px rgba(0,0,0,.04);
  --shadow-md:0 4px 16px rgba(0,0,0,.08),0 1px 4px rgba(0,0,0,.04);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}
/* ── LOGIN ── */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;background:var(--bg)}
.login-box{background:var(--surface);border-radius:var(--radius-xl);border:1px solid var(--border);padding:2.5rem 2rem;width:100%;max-width:400px;box-shadow:var(--shadow-md)}
.login-brand{text-align:center;margin-bottom:2rem}
.login-brand .org{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.login-brand h1{font-size:18px;font-weight:700;color:var(--blue-dark);line-height:1.3}
.login-brand p{font-size:12px;color:var(--text2);margin-top:4px}
.lf-group{margin-bottom:1rem}
.lf-group label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px}
.lf-group input{width:100%;padding:10px 14px;border:1.5px solid var(--border2);border-radius:var(--radius);font-size:14px;font-family:inherit;background:var(--surface);color:var(--text);outline:none;transition:border-color .15s,box-shadow .15s}
.lf-group input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(29,78,216,.1)}
.btn-signin{width:100%;padding:12px;background:var(--blue);color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;transition:background .15s;letter-spacing:.01em}
.btn-signin:hover{background:var(--blue-dark)}
.login-hint{margin-top:1rem;padding:10px 14px;background:var(--surface2);border-radius:var(--radius);font-size:12px;color:var(--text2);text-align:center}
.login-err{display:none;color:var(--red);font-size:12px;text-align:center;margin-top:.5rem;font-weight:500}
/* ── APP SHELL ── */
.app-shell{display:none;min-height:100vh}
.sidebar{width:240px;background:var(--surface);border-right:1px solid var(--border);position:fixed;top:0;left:0;height:100vh;display:flex;flex-direction:column;z-index:50;transition:transform .25s}
.sb-header{padding:1.25rem 1.1rem 1rem;border-bottom:1px solid var(--border)}
.sb-header .org-tag{font-size:10px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.sb-header h2{font-size:14px;font-weight:700;color:var(--text);line-height:1.3}
.sb-nav{flex:1;padding:.75rem .6rem;overflow-y:auto}
.nav-btn{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius);cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);background:none;border:none;width:100%;text-align:left;font-family:inherit;transition:background .12s,color .12s;margin-bottom:2px}
.nav-btn svg{width:16px;height:16px;flex-shrink:0}
.nav-btn:hover{background:var(--surface2);color:var(--text)}
.nav-btn.active{background:var(--blue-bg);color:var(--blue-dark);font-weight:600}
.sb-footer{padding:1rem;border-top:1px solid var(--border)}
.sb-user{font-size:13px;font-weight:600;color:var(--text)}
.sb-role{font-size:11px;color:var(--text3);margin-top:1px}
.btn-logout{margin-top:10px;width:100%;padding:7px;background:none;border:1.5px solid var(--border2);border-radius:var(--radius);font-size:12px;font-family:inherit;cursor:pointer;color:var(--text2);transition:all .15s}
.btn-logout:hover{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.main{margin-left:240px;padding:1.75rem;min-height:100vh}
/* ── TOPBAR ── */
.topbar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.75rem;gap:1rem;flex-wrap:wrap}
.topbar h1{font-size:22px;font-weight:700}
.topbar p{font-size:13px;color:var(--text2);margin-top:3px}
/* ── STATS ── */
.stats-row{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:12px;margin-bottom:1.5rem}
.stat{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);padding:1rem 1.1rem;box-shadow:var(--shadow)}
.stat-lbl{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.stat-val{font-size:26px;font-weight:700}
.stat-sub{font-size:11px;color:var(--text2);margin-top:3px}
/* ── CARD ── */
.card{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);padding:1.25rem;margin-bottom:1.25rem;box-shadow:var(--shadow)}
/* ── TOOLBAR ── */
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:1rem}
.toolbar input,.toolbar select{padding:8px 12px;border:1.5px solid var(--border2);border-radius:var(--radius);font-size:13px;font-family:inherit;background:var(--surface);color:var(--text);outline:none;transition:border-color .15s}
.toolbar input{flex:1;min-width:200px}
.toolbar input:focus,.toolbar select:focus{border-color:var(--blue)}
/* ── BUTTONS ── */
.btn{padding:8px 16px;border:1.5px solid var(--border2);border-radius:var(--radius);cursor:pointer;font-size:13px;font-weight:500;font-family:inherit;background:var(--surface);color:var(--text);white-space:nowrap;transition:all .12s}
.btn:hover{background:var(--surface2)}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue);font-weight:600}
.btn-primary:hover{background:var(--blue-dark);border-color:var(--blue-dark)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-danger{border-color:#FCA5A5;color:var(--red)}
.btn-danger:hover{background:var(--red-bg)}
.btn-success{background:var(--green);color:#fff;border-color:var(--green)}
.btn-success:hover{background:#166534}
/* ── TABLE ── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:900px}
th{text-align:left;padding:9px 12px;border-bottom:1.5px solid var(--border);color:var(--text3);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;background:var(--surface2);white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr:hover td{background:var(--surface2)}
tr.dup-row td{background:#FEF9C3 !important;border-left:3px solid #CA8A04}
tr.dup-row:hover td{background:#FEF08A !important}
/* ── PILLS ── */
.pill{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:9999px;font-size:11px;font-weight:600;white-space:nowrap}
.p-ok{background:var(--green-light);color:var(--green)}
.p-notok{background:var(--red-light);color:var(--red)}
.p-rejected{background:#F1F5F9;color:#475569}
.p-sc{background:var(--blue-light);color:var(--blue-dark)}
.p-st{background:var(--purple-light);color:var(--purple)}
.p-obc{background:var(--amber-light);color:var(--amber)}
.p-general{background:var(--surface2);color:var(--text2)}
.p-dup{background:#FEF9C3;color:#92400E;border:1px solid #FDE047}
/* ── DUPLICATE WARNING ── */
.dup-banner{background:#FFFBEB;border:1.5px solid #FCD34D;border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:1rem;display:none}
.dup-banner-title{font-size:13px;font-weight:700;color:#92400E;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.dup-banner ul{font-size:12px;color:#92400E;padding-left:1.25rem}
.dup-banner li{margin-bottom:3px}
/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(2px)}
.modal{background:var(--surface);border-radius:var(--radius-xl);padding:1.5rem;width:100%;max-width:640px;max-height:92vh;overflow-y:auto;box-shadow:0 25px 60px rgba(0,0,0,.2);border:1px solid var(--border)}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}
.modal-hdr h3{font-size:17px;font-weight:700}
.close-btn{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text3);line-height:1;padding:0 4px;transition:color .12s}
.close-btn:hover{color:var(--text)}
.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:12px;font-weight:600;color:var(--text2)}
.fg input,.fg select,.fg textarea{padding:9px 12px;border:1.5px solid var(--border2);border-radius:var(--radius);font-size:13px;font-family:inherit;background:var(--surface);color:var(--text);outline:none;transition:border-color .15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(29,78,216,.08)}
.fg input.field-dup{border-color:#F59E0B;background:#FFFBEB}
.fg textarea{resize:vertical;min-height:64px}
.fg-full{grid-column:1/-1}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--border)}
/* ── SECTION HEADERS ── */
.sec-hdr{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin:1.25rem 0 .75rem;padding-bottom:6px;border-bottom:1px solid var(--border)}
/* ── PROFILE VIEW ── */
.profile-top{display:flex;align-items:center;gap:14px;padding-bottom:1.1rem;margin-bottom:1.1rem;border-bottom:1px solid var(--border)}
.profile-av{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;flex-shrink:0}
.detail-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-bottom:.75rem}
.di .di-l{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.di .di-v{font-size:13px;color:var(--text)}
/* ── DOCS ── */
.docs-zone{border:2px dashed var(--border2);border-radius:var(--radius-lg);padding:1.5rem;text-align:center;cursor:pointer;transition:all .15s;background:var(--surface2)}
.docs-zone:hover,.docs-zone.drag-over{border-color:var(--blue);background:var(--blue-bg)}
.docs-zone p{font-size:13px;color:var(--text2);margin-top:6px}
.docs-zone .hint{font-size:11px;color:var(--text3);margin-top:4px}
.doc-list{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.doc-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface2);border-radius:var(--radius);border:1px solid var(--border)}
.doc-thumb{width:36px;height:36px;border-radius:6px;object-fit:cover;flex-shrink:0;border:1px solid var(--border)}
.doc-pdf-icon{width:36px;height:36px;border-radius:6px;background:var(--red-bg);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--red);flex-shrink:0}
.doc-name{flex:1;font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.doc-size{font-size:11px;color:var(--text3)}
.doc-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;padding:2px;transition:color .12s}
.doc-del:hover{color:var(--red)}
.doc-view{background:none;border:none;cursor:pointer;color:var(--blue);font-size:12px;font-weight:600;font-family:inherit;padding:2px 6px}
/* ── PAGER ── */
.pager{display:flex;align-items:center;justify-content:space-between;margin-top:12px;font-size:12px;color:var(--text2);flex-wrap:wrap;gap:8px}
.pager-btns{display:flex;gap:4px}
.pb{padding:4px 10px;border:1.5px solid var(--border2);border-radius:var(--radius);cursor:pointer;font-size:12px;font-family:inherit;background:var(--surface);color:var(--text)}
.pb:disabled{opacity:.35;cursor:default}
.pb.cur{background:var(--blue);color:#fff;border-color:var(--blue)}
/* ── TOAST ── */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;padding:11px 18px;border-radius:var(--radius-lg);font-size:13px;font-weight:600;z-index:999;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none;max-width:320px;box-shadow:var(--shadow-md)}
.toast.show{opacity:1;transform:translateY(0)}
.toast-success{background:#1C4532;color:#D1FAE5}
.toast-error{background:#7F1D1D;color:#FEE2E2}
.toast-warn{background:#78350F;color:#FEF3C7}
/* ── HIGHLIGHT BADGE ── */
.dup-badge{display:inline-flex;align-items:center;gap:3px;padding:1px 7px;border-radius:9999px;font-size:10px;font-weight:700;background:#FEF9C3;color:#92400E;border:1px solid #FDE047;margin-left:6px}
/* ── MOBILE ── */
.mob-toggle{display:none;position:fixed;top:1rem;left:1rem;z-index:60;background:var(--surface);border:1.5px solid var(--border2);border-radius:var(--radius);padding:8px;cursor:pointer;box-shadow:var(--shadow)}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:40}
@media(max-width:800px){
  .mob-toggle{display:flex}
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .sb-overlay.open{display:block}
  .main{margin-left:0;padding:1rem;padding-top:4.5rem}
  .stats-row{grid-template-columns:repeat(2,minmax(0,1fr))}
  .form-grid{grid-template-columns:1fr}
}
@media(max-width:480px){
  .stats-row{grid-template-columns:repeat(2,minmax(0,1fr))}
}
/* ── SAVED BADGE ── */
.saved-tag{font-size:11px;padding:4px 10px;border-radius:var(--radius);background:var(--green-light);color:var(--green);font-weight:600;display:none}
/* ── DOC VIEWER ── */
.doc-viewer-modal{background:var(--surface);border-radius:var(--radius-xl);padding:1.5rem;width:100%;max-width:800px;max-height:92vh;display:flex;flex-direction:column;gap:1rem}
.doc-viewer-modal img{max-width:100%;border-radius:var(--radius);border:1px solid var(--border)}
.doc-viewer-modal iframe{width:100%;height:500px;border:none;border-radius:var(--radius);background:#f5f5f5}
/* ── IMPORT BAR ── */
.import-bar{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--blue-bg);border-radius:var(--radius);border:1px solid var(--blue-light);margin-bottom:1rem;font-size:13px;color:var(--blue-dark)}
.import-bar strong{font-weight:700}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-brand">
      <div class="org">St. Joan's Education Society</div>
      <h1>JAI BHIM PRATIBHA VIKAS YOJNA</h1>
      <p>Student Management Portal</p>
    </div>
    <div class="lf-group"><label>Username</label><input type="text" id="loginUser" placeholder="Enter username" autocomplete="username"></div>
    <div class="lf-group"><label>Password</label><input type="password" id="loginPass" placeholder="Enter password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn-signin" onclick="doLogin()">Sign In</button>
    <div class="login-err" id="loginErr">Invalid username or password.</div>
    <div class="login-hint">Default login: <strong>admin</strong> / <strong>sachdeva123</strong></div>
  </div>
</div>

<!-- APP -->
<div class="app-shell" id="appShell">
  <button class="mob-toggle" onclick="toggleSidebar()">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect y="3" width="18" height="2" rx="1" fill="currentColor"/><rect y="8" width="18" height="2" rx="1" fill="currentColor"/><rect y="13" width="18" height="2" rx="1" fill="currentColor"/></svg>
  </button>
  <div class="sb-overlay" id="sbOverlay" onclick="toggleSidebar()"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sb-header">
      <div class="org-tag">St. Joan's Education Society</div>
      <h2>Pratibha Vikas Yojna Portal</h2>
    </div>
    <nav class="sb-nav">
      <button class="nav-btn active" id="nb-dashboard" onclick="goTab('dashboard')">
        <svg viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1.5" fill="currentColor"/><rect x="9" y="1" width="6" height="6" rx="1.5" fill="currentColor" opacity=".4"/><rect x="1" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity=".4"/><rect x="9" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity=".4"/></svg>
        Dashboard
      </button>
      <button class="nav-btn" id="nb-students" onclick="goTab('students')">
        <svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5" r="3" fill="currentColor"/><path d="M2 14c0-3.314 2.686-6 6-6s6 2.686 6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        All Students
      </button>
      <button class="nav-btn" id="nb-duplicates" onclick="goTab('duplicates')">
        <svg viewBox="0 0 16 16" fill="none"><path d="M8 2L9.5 6H14L10.5 8.5L12 13L8 10.5L4 13L5.5 8.5L2 6H6.5L8 2Z" fill="currentColor"/></svg>
        Duplicate Check
      </button>
      <button class="nav-btn" id="nb-add" onclick="goTab('add')">
        <svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.5"/><path d="M8 5v6M5 8h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Add Student
      </button>
    </nav>
    <div class="sb-footer">
      <div class="sb-user" id="sbUser">Admin</div>
      <div class="sb-role">Administrator</div>
      <button class="btn-logout" onclick="doLogout()">Sign Out</button>
    </div>
  </aside>

  <main class="main" id="mainArea"></main>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════
//  CONFIG
// ═══════════════════════════════
const CREDS = { admin:'sachdeva123', prashant:'college2024' };
const STORE = 'jbpvy_students_v1';
const SES   = 'jbpvy_session';

// ═══════════════════════════════

function saveData() {
  // Strip base64 doc data for storage (only keep metadata)
  const slim = students.map(s => ({
    ...s,
    docs: (s.docs||[]).map(d => ({
      name: d.name, size: d.size, type: d.type,
      dataUrl: d.dataUrl  // keep full dataUrl (localStorage can hold ~5MB)
    }))
  }));
  try {
    localStorage.setItem(STORE, JSON.stringify({ students: slim, nextId }));
    showSavedBadge();
  } catch(e) {
    showToast('Storage full — consider removing large documents', 'error');
  }
}

function loadData() {
  try {
    const raw = localStorage.getItem(STORE);
    if (raw) {
      const d = JSON.parse(raw);
      students = d.students || [];
      nextId   = d.nextId   || 1000;
    } else {
      // First load — seed from Excel data
      students = SEED_DATA.map((s,i) => ({ ...s, id: i+1, docs: [] }));
      nextId   = students.length + 1;
      saveData();
    }
  } catch(e) {
    students = SEED_DATA.map((s,i) => ({ ...s, id: i+1, docs: [] }));
    nextId   = students.length + 1;
  }
}

function showSavedBadge() {
  const el = document.getElementById('savedTag');
  if (!el) return;
  el.textContent = 'Saved ' + new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});

}

// ═══════════════════════════════
//  DUPLICATE DETECTION
// ═══════════════════════════════
function findDuplicates(excludeId = null) {
  const groups = { name:{}, aadhar:{}, mobile:{}, email:{} };
  students.forEach(s => {
    if (s.id === excludeId) return;
    const n = s.name.trim().toUpperCase();
    const a = s.aadhar.replace(/\s/g,'');
    const m = s.mobile.replace(/[\s,\-]/g,'');
    const e = s.email.trim().toLowerCase();
    if (n) { groups.name[n]   = groups.name[n]   || []; groups.name[n].push(s.id); }
    if (a && a.length >= 10) { groups.aadhar[a] = groups.aadhar[a] || []; groups.aadhar[a].push(s.id); }
    if (m && m.length >= 10) { groups.mobile[m] = groups.mobile[m] || []; groups.mobile[m].push(s.id); }
    if (e && e.includes('@')) { groups.email[e] = groups.email[e] || []; groups.email[e].push(s.id); }
  });
  const dupIds = new Set();
  const reasons = {};
  ['name','aadhar','mobile','email'].forEach(field => {
    Object.entries(groups[field]).forEach(([val, ids]) => {
      if (ids.length > 1) {
        ids.forEach(id => {
          dupIds.add(id);
          reasons[id] = reasons[id] || [];
          reasons[id].push(field + ': ' + val);
        });
      }
    });
  });
  return { dupIds, reasons };
}

function checkNewEntry(f, excludeId = null) {
  const warnings = [];
  const name  = (f.name||'').trim().toUpperCase();
  const aadhar= (f.aadhar||'').replace(/\s/g,'');
  const mobile= (f.mobile||'').replace(/[\s,\-]/g,'');
  const email = (f.email||'').trim().toLowerCase();
  students.forEach(s => {
    if (s.id === excludeId) return;
    const sn = s.name.trim().toUpperCase();
    const sa = s.aadhar.replace(/\s/g,'');
    const sm = s.mobile.replace(/[\s,\-]/g,'');
    const se = s.email.trim().toLowerCase();
    const matches = [];
    if (name  && sn && name === sn)                      matches.push('Name');
    if (aadhar && aadhar.length>=10 && sa && aadhar===sa) matches.push('Aadhar');
    if (mobile && mobile.length>=10 && sm && mobile===sm) matches.push('Mobile');
    if (email  && email.includes('@') && se && email===se)matches.push('Email');
    if (matches.length) warnings.push({ student: s, fields: matches });
  });
  return warnings;
}

function statusPill(st) {
  if (!st) return '';
  const s = st.toUpperCase();
  if (s==='OK') return `<span class="pill p-ok">OK</span>`;
  if (s==='NOT OK') return `<span class="pill p-notok">Not OK</span>`;
  if (s==='REJECTED') return `<span class="pill p-rejected">Rejected</span>`;
  return `<span class="pill p-general">${st}</span>`;
}
function catPill(cat) {
  if (!cat) return '';
  const c = cat.toUpperCase();
  if (c==='SC') return `<span class="pill p-sc">SC</span>`;
  if (c==='ST') return `<span class="pill p-st">ST</span>`;
  if (c.includes('OBC')) return `<span class="pill p-obc">OBC</span>`;
  return `<span class="pill p-general">${cat}</span>`;
}
function avBg(id) {
  const colors = ['#DBEAFE:#1E3A8A','#DCFCE7:#166534','#FEE2E2:#991B1B','#EDE9FE:#4C1D95','#FEF3C7:#92400E','#CCFBF1:#134E4A'];
  const [bg,col] = colors[id % colors.length].split(':');
  return `background:${bg};color:${col}`;
}
function initials(name) {
  return name.split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase();
}
function getFiltered() {
  return students.filter(s => {
    const qm = !q || [s.name,s.aadhar,s.mobile,s.email,s.fatherName,s.course,s.center].some(v => v && v.toLowerCase().includes(q.toLowerCase()));
    const cm = fCourse==='All' || s.course===fCourse;
    const sm = fStatus==='All' || s.status===fStatus;
    const cnm= fCenter==='All' || s.center===fCenter;
    return qm && cm && sm && cnm;
  });
}
function getCourses() { return [...new Set(students.map(s=>s.course).filter(Boolean))].sort(); }
function getCenters() { return [...new Set(students.map(s=>s.center).filter(Boolean))].sort(); }
function exportCSV() {
  const h = ['S.No','Name','Father Name','Address','DOB','Aadhar','Category','Course','Duration','Center','Email','Mobile','Caste Cert','Income Cert','Part A&B','Status','Docs Count'];
  const rows = students.map(s => [s.id,s.name,s.fatherName,s.address,s.dob,s.aadhar,s.category,s.course,s.duration,s.center,s.email,s.mobile,s.casteCert,s.incomeCert,s.partAB,s.status,(s.docs||[]).length]);
  const csv = [h,...rows].map(r=>r.map(v=>`"${(v||'').toString().replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a'); a.href = 'data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv); a.download = 'JBPVY_Students_'+new Date().toISOString().slice(0,10)+'.csv'; a.click();
  showToast('CSV exported successfully', 'success');
}
let toastT;
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast toast-' + type;
  t.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => t.classList.remove('show'), 3200);
}

// ─── DUPLICATES PAGE ───
function renderDuplicates() {
  const { dupIds, reasons } = findDuplicates();
  const dupStudents = students.filter(s => dupIds.has(s.id));
  // Group by reason key
  const groups = {};
  dupStudents.forEach(s => {
    (reasons[s.id]||[]).forEach(r => {
      groups[r] = groups[r] || [];
      if (!groups[r].find(x=>x.id===s.id)) groups[r].push(s);
    });
  });

  return `
  <div class="topbar">
    <div><h1>Duplicate Check</h1><p>${dupIds.size} entries flagged across ${Object.keys(groups).length} conflict group(s)</p></div>
    <span class="saved-tag" id="savedTag"></span>
  </div>
  ${dupIds.size === 0
    ? `<div class="card" style="text-align:center;padding:3rem"><div style="font-size:48px;margin-bottom:12px">✓</div><h3 style="font-size:18px;font-weight:700;color:var(--green)">No Duplicates Found</h3><p style="color:var(--text2);margin-top:6px">All student records have unique Name, Aadhar, Mobile and Email.</p></div>`
    : Object.entries(groups).map(([reason, grpStudents]) => `
      <div class="card" style="border-left:4px solid #F59E0B">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
          <span style="font-size:12px;font-weight:700;color:#92400E;background:#FEF9C3;padding:4px 10px;border-radius:9999px">⚠ Duplicate ${reason}</span>
          <span style="font-size:12px;color:var(--text2)">${grpStudents.length} records share this value</span>
        </div>
        <div class="tbl-wrap">
        <table>
          <thead><tr><th>ID</th><th>Name</th><th>Father's Name</th><th>Aadhar</th><th>Mobile</th><th>Email</th><th>Course</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody>
            ${grpStudents.map(s=>`<tr style="background:#FEF9C3">

              <td style="font-weight:600">${s.name}</td>
              <td style="font-size:12px;color:var(--text2)">${s.fatherName}</td>
              <td style="font-family:'DM Mono',monospace;font-size:12px">${s.aadhar||'—'}</td>
              <td style="font-size:12px">${s.mobile||'—'}</td>
              <td style="font-size:12px">${s.email||'—'}</td>
              <td style="font-size:12px">${s.course||'—'}</td>

}

// Live dup check for add form
function liveCheckDup() {
  const f = {
    name:   document.getElementById('a_name')  ?.value || '',
    aadhar: document.getElementById('a_aadhar')?.value || '',
    mobile: document.getElementById('a_mobile')?.value || '',
    email:  document.getElementById('a_email') ?.value || '',
  };
  const warnings = checkNewEntry(f);
  const banner = document.getElementById('addDupBanner');
  const list   = document.getElementById('addDupList');
  if (!banner || !list) return;
  if (warnings.length > 0) {
    banner.style.display = 'block';
    list.innerHTML = warnings.map(w=>`<li><strong>${w.student.name}</strong> (ID ${w.student.id}) — matches on: ${w.fields.join(', ')}</li>`).join('');
    // Highlight conflicting fields
    ['name','aadhar','mobile','email'].forEach(field => {
      const el = document.getElementById('a_' + field);
      if (!el) return;
      const hasConflict = warnings.some(w=>w.fields.map(f=>f.toLowerCase()).includes(field));
      el.classList.toggle('field-dup', hasConflict);
    });
  } else {
    banner.style.display = 'none';
    ['name','aadhar','mobile','email'].forEach(f => {
      const el = document.getElementById('a_' + f);
      if (el) el.classList.remove('field-dup');
    });
  }
}

  const f = {
    name:   document.getElementById('e_name')  ?.value || '',
    aadhar: document.getElementById('e_aadhar')?.value || '',

function gV(id) { const el = document.getElementById(id); return el ? el.value.trim() : ''; }

function submitAdd() {
  const name  = gV('a_name');
  const father= gV('a_father');
  const aadhar= gV('a_aadhar');
  const mobile= gV('a_mobile');
  if (!name || !father || !aadhar || !mobile) {
    showToast('Name, Father Name, Aadhar & Mobile are required', 'error'); return;
  }
  const warnings = checkNewEntry({ name, aadhar, mobile, email: gV('a_email') });
  if (warnings.length > 0) {
    const proceed = confirm(`⚠ DUPLICATE WARNING\n\nThis student matches existing records:\n${warnings.map(w=>`• ${w.student.name} (matches: ${w.fields.join(', ')})`).join('\n')}\n\nDo you still want to add this student?`);
    if (!proceed) return;
  }
  const newStudent = {
    id: nextId++, name, fatherName: father,
    address: gV('a_addr'), dob: gV('a_dob'),
    aadhar, category: gV('a_cat'), course: gV('a_course'),
    duration: gV('a_duration'), center: gV('a_center'),
    email: gV('a_email'), mobile,
    casteCert: gV('a_caste'), incomeCert: gV('a_income'),
    partAB: gV('a_partab'), status: gV('a_status'),
    docs: [...addDocs], joinDate: new Date().toISOString().slice(0,10)
  };
  students.push(newStudent);
  saveData();
  showToast('Student added successfully!', 'success');
  goTab('students');
}

function openEditById(id) {
  form.editId = id;
  tab = 'edit';

function submitEdit() {
  const idx = students.findIndex(s=>s.id===form.editId);
  if (idx < 0) return;
  const name  = gV('e_name');
  const aadhar= gV('e_aadhar');
  const mobile= gV('e_mobile');
  if (!name) { showToast('Name is required', 'error'); return; }
  const warnings = checkNewEntry({ name, aadhar, mobile, email: gV('e_email') }, form.editId);
  if (warnings.length > 0) {
    const proceed = confirm(`⚠ DUPLICATE WARNING\n\nThis update matches existing records:\n${warnings.map(w=>`• ${w.student.name} (matches: ${w.fields.join(', ')})`).join('\n')}\n\nSave anyway?`);
    if (!proceed) return;
  }
  students[idx] = { ...students[idx],
    name, fatherName: gV('e_father'), address: gV('e_addr'), dob: gV('e_dob'),
    aadhar, category: gV('e_cat'), course: gV('e_course'),
    duration: gV('e_duration'), center: gV('e_center'),
    email: gV('e_email'), mobile,
    casteCert: gV('e_caste'), incomeCert: gV('e_income'),
    partAB: gV('e_partab'), status: gV('e_status'),
    docs: [...editDocs]
  };
  saveData();
  showToast('Student updated!', 'success');
  goTab('students');
}

function delStudent(id) {
  const s = students.find(x=>x.id===id);
  if (!s) return;
  if (confirm(`Delete ${s.name}?\nThis action cannot be undone.`)) {
    students = students.filter(x=>x.id!==id);
    saveData(); renderTab();
    showToast('Student deleted', 'warn');
  }
}

// ═══════════════════════════════
//  DOCUMENT HANDLING
// ═══════════════════════════════
function handleFileSelect(event, mode) {
  const files = Array.from(event.target.files);
  processFiles(files, mode);
  event.target.value = '';
}
function handleFileDrop(event, mode) {
  event.preventDefault();
  const zone = mode==='add' ? document.getElementById('addDocsZone') : document.getElementById('editDocsZone');
  if (zone) zone.classList.remove('drag-over');
  processFiles(Array.from(event.dataTransfer.files), mode);
}
function processFiles(files, mode) {
  const allowed = ['application/pdf','image/jpeg','image/jpg'];
  files.forEach(file => {
    if (!allowed.includes(file.type) && !file.name.match(/\.(pdf|jpg|jpeg)$/i)) {
      showToast(`${file.name}: Only PDF, JPG, JPEG allowed`, 'error'); return;
    }
    if (file.size > 5*1024*1024) {
      showToast(`${file.name}: File too large (max 5MB)`, 'error'); return;
    }
    const reader = new FileReader();
    reader.onload = e => {
      const doc = { name: file.name, size: file.size, type: file.type, dataUrl: e.target.result };
      if (mode === 'add') { addDocs.push(doc); renderAddDocList(); }
      else { editDocs.push(doc); renderEditDocList(); }
    };
    reader.readAsDataURL(file);
  });
}
function renderAddDocList() {
  const el = document.getElementById('addDocList');
  if (!el) return;
  el.innerHTML = addDocs.map((d,i)=>docItemHTML(d,i,'add')).join('');
}
function renderEditDocList() {
  const el = document.getElementById('editDocList');
  if (!el) return;
  el.innerHTML = editDocs.map((d,i)=>docItemHTML(d,i,'edit')).join('');
}
function docItemHTML(d, i, mode) {
  const isPDF = d.type==='application/pdf' || d.name.toLowerCase().endsWith('.pdf');
  const thumb = isPDF
    ? `<div class="doc-pdf-icon">PDF</div>`
    : `<img class="doc-thumb" src="${d.dataUrl}" alt="${d.name}">`;
  const size = (d.size/1024) < 1024 ? Math.round(d.size/1024)+'KB' : (d.size/1024/1024).toFixed(1)+'MB';
  return `<div class="doc-item">
    ${thumb}
    <span class="doc-name" title="${d.name}">${d.name}</span>
    <span class="doc-size">${size}</span>
    <button class="doc-view" onclick="viewDoc('${mode}',${i})">View</button>
    <button class="doc-del" onclick="removeDoc('${mode}',${i})" title="Remove">×</button>
  </div>`;
}
function removeDoc(mode, i) {
  if (mode==='add') { addDocs.splice(i,1); renderAddDocList(); }
  else { editDocs.splice(i,1); renderEditDocList(); }
}
function viewDoc(mode, i) {
  const doc = mode==='add' ? addDocs[i] : editDocs[i];
  if (!doc) return;
  openDocViewer(doc);
}

  div.id = 'viewModal';
  div.className = 'modal-overlay';
  div.onclick = e => { if(e.target===div) closeViewModal(); };
  div.innerHTML = `<div class="modal">
    <div class="modal-hdr">
      <h3>Student Profile</h3>
      <button class="close-btn" onclick="closeViewModal()">×</button>
    </div>
    <div class="profile-top">
      <div class="profile-av" style="${avBg(s.id)}">${initials(s.name)}</div>
      <div>
        <div style="font-size:18px;font-weight:700">${s.name}</div>
        <div style="font-size:13px;color:var(--text2);margin-top:3px">ID: ${s.id} · ${catPill(s.category)} ${statusPill(s.status)}</div>
      </div>
    </div>
    <div class="sec-hdr">Personal Details</div>
    <div class="detail-grid">
      <div class="di"><div class="di-l">Father's Name</div><div class="di-v">${s.fatherName||'—'}</div></div>
      <div class="di"><div class="di-l">Date of Birth</div><div class="di-v">${s.dob||'—'}</div></div>
      <div class="di"><div class="di-l">Aadhar No.</div><div class="di-v" style="font-family:'DM Mono',monospace">${s.aadhar||'—'}</div></div>
      <div class="di"><div class="di-l">Mobile</div><div class="di-v">${s.mobile||'—'}</div></div>
      <div class="di"><div class="di-l">Email</div><div class="di-v">${s.email||'—'}</div></div>
      <div class="di" style="grid-column:1/-1"><div class="di-l">Address</div><div class="di-v">${s.address||'—'}</div></div>
    </div>
    <div class="sec-hdr">Course Details</div>
    <div class="detail-grid">
      <div class="di"><div class="di-l">Course</div><div class="di-v">${s.course||'—'}</div></div>
      <div class="di"><div class="di-l">Center</div><div class="di-v">${s.center||'—'}</div></div>
      <div class="di"><div class="di-l">Duration</div><div class="di-v">${s.duration||'—'}</div></div>
      <div class="di"><div class="di-l">Category</div><div class="di-v">${s.category||'—'}</div></div>
      <div class="di"><div class="di-l">Caste Certificate</div><div class="di-v">${s.casteCert||'—'}</div></div>
      <div class="di"><div class="di-l">Income Certificate</div><div class="di-v">${s.incomeCert||'—'}</div></div>
      <div class="di"><div class="di-l">Part A &amp; B</div><div class="di-v">${s.partAB||'—'}</div></div>
      <div class="di"><div class="di-l">Status</div><div class="di-v">${statusPill(s.status)}</div></div>
    </div>
    ${fp > 0 ? `<div class="sec-hdr">Documents (${fp})</div>
    <div class="doc-list">${(s.docs||[]).map((d,i)=>docItemHTMLView(d,id,i)).join('')}</div>` : ''}
    <div class="form-actions">
      <button class="btn" onclick="closeViewModal()">Close</button>
      <button class="btn btn-primary" onclick="closeViewModal();openEditById(${s.id})">Edit Student</button>
    </div>
  </div>`;
  document.body.appendChild(div);
}

function docItemHTMLView(d, studentId, i) {
  const isPDF = d.type==='application/pdf' || d.name.toLowerCase().endsWith('.pdf');
  const thumb = isPDF
    ? `<div class="doc-pdf-icon">PDF</div>`
    : `<img class="doc-thumb" src="${d.dataUrl}" alt="${d.name}">`;
  const size = (d.size/1024)<1024 ? Math.round(d.size/1024)+'KB' : (d.size/1024/1024).toFixed(1)+'MB';
  return `<div class="doc-item">
    ${thumb}
    <span class="doc-name" title="${d.name}">${d.name}</span>
    <span class="doc-size">${size}</span>
    <button class="doc-view" onclick="viewDocFromStudent(${studentId},${i})">View</button>
  </div>`;
}

function closeViewModal() { const el=document.getElementById('viewModal'); if(el) el.remove(); }

function openDocViewer(doc) {
  const isPDF = doc.type==='application/pdf' || doc.name.toLowerCase().endsWith('.pdf');
  const div = document.createElement('div');
  div.id = 'docViewerModal';
  div.className = 'modal-overlay';
  div.onclick = e => { if(e.target===div) div.remove(); };
  const content = isPDF
    ? `<iframe src="${doc.dataUrl}" title="${doc.name}"></iframe>`
    : `<img src="${doc.dataUrl}" alt="${doc.name}" style="max-width:100%;max-height:70vh;object-fit:contain;border-radius:8px">`;
  div.innerHTML = `<div class="doc-viewer-modal">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <span style="font-weight:700;font-size:15px">${doc.name}</span>
      <div style="display:flex;gap:8px">
        <a href="${doc.dataUrl}" download="${doc.name}" class="btn btn-sm btn-success">Download</a>
        <button class="close-btn" onclick="document.getElementById('docViewerModal').remove()">×</button>
      </div>
    </div>
    ${content}
  </div>`;
  document.body.appendChild(div);
}

function viewDocFromStudent(studentId, docIdx) {
  const s = students.find(x=>x.id===studentId);
  if (!s || !s.docs || !s.docs[docIdx]) return;
  openDocViewer(s.docs[docIdx]);
}

// ═══════════════════════════════
//  INIT
// ═══════════════════════════════
checkSession();
</script>
</body>
</html>
