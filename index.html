<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sachdeva College — SSC CGL Test Series</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0F1117; --surface:#181B24; --surface2:#1E2230; --surface3:#252A38;
  --border:#2A2F40; --border2:#363C50;
  --text:#F0F2F8; --text2:#9BA3BC; --text3:#5C6480;
  --blue:#4F8EF7; --blue-d:#2563EB; --blue-bg:rgba(79,142,247,0.1); --blue-glow:rgba(79,142,247,0.25);
  --green:#34D399; --green-d:#059669; --green-bg:rgba(52,211,153,0.1);
  --amber:#FBBF24; --amber-d:#D97706; --amber-bg:rgba(251,191,36,0.1);
  --red:#F87171; --red-d:#DC2626; --red-bg:rgba(248,113,113,0.1);
  --purple:#A78BFA; --purple-bg:rgba(167,139,250,0.1);
  --orange:#FB923C; --orange-bg:rgba(251,146,60,0.1);
  --radius:10px; --radius-lg:16px; --radius-xl:22px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6}
/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ══════════════════ LOGIN ══════════════════ */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;background:var(--bg);position:relative;overflow:hidden}
.login-wrap::before{content:'';position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(79,142,247,0.08) 0%,transparent 70%);top:-100px;left:-100px;pointer-events:none}
.login-wrap::after{content:'';position:absolute;width:500px;height:500px;background:radial-gradient(circle,rgba(167,139,250,0.06) 0%,transparent 70%);bottom:-100px;right:-100px;pointer-events:none}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:2.5rem 2rem;width:100%;max-width:420px;position:relative;z-index:1}
.login-logo{text-align:center;margin-bottom:2rem}
.login-logo .badge{display:inline-block;background:var(--blue-bg);color:var(--blue);font-size:11px;font-weight:700;padding:4px 12px;border-radius:9999px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;border:1px solid rgba(79,142,247,0.2)}
.login-logo h1{font-size:22px;font-weight:800;line-height:1.2}
.login-logo p{font-size:13px;color:var(--text2);margin-top:5px}
.login-tabs{display:flex;background:var(--surface2);border-radius:var(--radius);padding:4px;gap:4px;margin-bottom:1.5rem}
.ltab{flex:1;padding:8px;text-align:center;border-radius:7px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text2);transition:all .2s;border:none;background:none;font-family:inherit}
.ltab.active{background:var(--blue-d);color:#fff}
.lf-group{margin-bottom:1rem}
.lf-group label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
.lf-group input{width:100%;padding:11px 14px;background:var(--surface2);border:1.5px solid var(--border2);border-radius:var(--radius);font-size:14px;font-family:inherit;color:var(--text);outline:none;transition:border-color .15s}
.lf-group input:focus{border-color:var(--blue)}
.btn-login{width:100%;padding:12px;background:var(--blue-d);color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .15s;letter-spacing:.02em}
.btn-login:hover{background:#1D4ED8}
.login-err{display:none;color:var(--red);font-size:12px;text-align:center;margin-top:.75rem;font-weight:500}
.login-hint{margin-top:1rem;padding:10px 14px;background:var(--surface2);border-radius:var(--radius);font-size:12px;color:var(--text2);text-align:center;border:1px solid var(--border)}

/* ══════════════════ APP SHELL ══════════════════ */
.app{display:none;min-height:100vh;background:var(--bg)}

/* ── TOPNAV ── */
.topnav{position:sticky;top:0;z-index:100;background:rgba(15,17,23,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 1.5rem;height:60px;display:flex;align-items:center;justify-content:space-between;gap:1rem}
.topnav-brand{display:flex;align-items:center;gap:10px}
.topnav-brand .logo{width:32px;height:32px;background:var(--blue-d);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff;flex-shrink:0}
.topnav-brand span{font-weight:700;font-size:15px}
.topnav-brand small{display:block;font-size:11px;color:var(--text2);font-weight:400}
.topnav-right{display:flex;align-items:center;gap:10px}
.user-chip{display:flex;align-items:center;gap:8px;padding:6px 12px;background:var(--surface2);border-radius:9999px;font-size:13px;font-weight:600;border:1px solid var(--border)}
.user-av{width:26px;height:26px;border-radius:50%;background:var(--blue-d);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.btn-sm-ghost{padding:6px 12px;background:none;border:1.5px solid var(--border2);border-radius:var(--radius);font-size:12px;font-weight:600;cursor:pointer;color:var(--text2);font-family:inherit;transition:all .15s}
.btn-sm-ghost:hover{border-color:var(--red);color:var(--red)}

/* ── LAYOUT ── */
.layout{display:flex;min-height:calc(100vh - 60px)}
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);padding:.75rem .6rem;flex-shrink:0;position:sticky;top:60px;height:calc(100vh - 60px);overflow-y:auto}
.content{flex:1;padding:1.75rem;overflow-y:auto;min-width:0}
.nav-section{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;padding:6px 10px;margin-top:8px}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:var(--radius);cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);background:none;border:none;width:100%;text-align:left;font-family:inherit;transition:all .15s;margin-bottom:2px}
.nav-item svg{width:15px;height:15px;flex-shrink:0}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--blue-bg);color:var(--blue);font-weight:600;border:1px solid rgba(79,142,247,0.2)}
.nav-item .nav-badge{margin-left:auto;background:var(--blue-d);color:#fff;font-size:10px;font-weight:700;padding:1px 7px;border-radius:9999px}

/* ── COMMON ── */
.page-hdr{margin-bottom:1.75rem}
.page-hdr h1{font-size:24px;font-weight:800}
.page-hdr p{font-size:13px;color:var(--text2);margin-top:4px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem}
.card+.card{margin-top:1rem}
.stats-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:1.5rem}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.1rem}
.stat-lbl{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.stat-val{font-size:26px;font-weight:800}
.stat-sub{font-size:11px;color:var(--text2);margin-top:3px}
.btn{padding:9px 18px;border-radius:var(--radius);cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;transition:all .15s;border:1.5px solid transparent;white-space:nowrap}
.btn-primary{background:var(--blue-d);color:#fff;border-color:var(--blue-d)}
.btn-primary:hover{background:#1D4ED8}
.btn-ghost{background:none;border-color:var(--border2);color:var(--text2)}
.btn-ghost:hover{border-color:var(--blue);color:var(--blue)}
.btn-green{background:var(--green-d);color:#fff;border-color:var(--green-d)}
.btn-green:hover{background:#047857}
.btn-red{background:none;border-color:var(--red);color:var(--red)}
.btn-red:hover{background:var(--red-bg)}
.btn-sm{padding:5px 12px;font-size:12px}

/* ══════════════════ TEST CARDS ══════════════════ */
.tests-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.test-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;transition:all .2s;cursor:pointer;position:relative;overflow:hidden}
.test-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--radius-lg) var(--radius-lg) 0 0}
.test-card.type-full::before{background:linear-gradient(90deg,var(--blue),var(--purple))}
.test-card.type-chapter::before{background:linear-gradient(90deg,var(--green),var(--blue))}
.test-card.type-section::before{background:linear-gradient(90deg,var(--amber),var(--orange))}
.test-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.test-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.test-type-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:9999px;text-transform:uppercase;letter-spacing:.06em}
.badge-full{background:var(--blue-bg);color:var(--blue);border:1px solid rgba(79,142,247,0.2)}
.badge-chapter{background:var(--green-bg);color:var(--green);border:1px solid rgba(52,211,153,0.2)}
.badge-section{background:var(--amber-bg);color:var(--amber);border:1px solid rgba(251,191,36,0.2)}
.test-title{font-size:15px;font-weight:700;margin-bottom:6px;line-height:1.3}
.test-meta{display:flex;gap:12px;font-size:12px;color:var(--text2);margin-bottom:12px;flex-wrap:wrap}
.test-meta span{display:flex;align-items:center;gap:4px}
.test-score-bar{height:4px;background:var(--surface3);border-radius:2px;margin-bottom:8px;overflow:hidden}
.test-score-fill{height:100%;border-radius:2px;background:var(--green)}
.test-bottom{display:flex;align-items:center;justify-content:space-between}
.attempted-tag{font-size:11px;color:var(--green);font-weight:600}
.not-attempted-tag{font-size:11px;color:var(--text3)}

/* ══════════════════ TEST INTERFACE ══════════════════ */
.exam-wrap{display:none;min-height:100vh;background:var(--bg);flex-direction:column}
.exam-topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:.75rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;position:sticky;top:0;z-index:100}
.exam-title{font-weight:700;font-size:15px}
.timer-box{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1.5px solid var(--border2);border-radius:var(--radius);padding:6px 14px}
.timer-box.danger{border-color:var(--red);background:var(--red-bg)}
.timer-val{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:700;color:var(--text)}
.timer-box.danger .timer-val{color:var(--red)}
.exam-body{display:flex;flex:1;gap:0;min-height:0}
.question-panel{flex:1;padding:1.75rem;overflow-y:auto;min-width:0}
.sidebar-panel{width:280px;background:var(--surface);border-left:1px solid var(--border);padding:1rem;overflow-y:auto;flex-shrink:0}
.q-number{font-size:12px;font-weight:600;color:var(--text3);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em}
.q-subject-tag{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:9999px;margin-bottom:14px}
.q-text{font-size:16px;font-weight:500;line-height:1.7;margin-bottom:1.5rem;color:var(--text)}
.options-list{display:flex;flex-direction:column;gap:10px;margin-bottom:2rem}
.option-item{display:flex;align-items:flex-start;gap:12px;padding:13px 16px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .15s;font-size:14px;font-weight:500}
.option-item:hover{border-color:var(--blue);background:var(--blue-bg)}
.option-item.selected{border-color:var(--blue);background:var(--blue-bg);color:var(--blue)}
.option-item.correct{border-color:var(--green);background:var(--green-bg);color:var(--green)}
.option-item.wrong{border-color:var(--red);background:var(--red-bg);color:var(--red)}
.opt-letter{width:26px;height:26px;border-radius:50%;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;transition:all .15s}
.option-item.selected .opt-letter{background:var(--blue-d);color:#fff}
.option-item.correct .opt-letter{background:var(--green-d);color:#fff}
.option-item.wrong .opt-letter{background:var(--red-d);color:#fff}
.q-actions{display:flex;gap:10px;flex-wrap:wrap}
.q-nav{display:flex;align-items:center;gap:8px;margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid var(--border)}
/* Question palette */
.palette-section{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;margin-top:12px}
.palette-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:12px}
.pq{width:100%;aspect-ratio:1;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:all .15s;background:var(--surface3);color:var(--text2)}
.pq.answered{background:var(--green-d);color:#fff}
.pq.review{background:var(--purple);color:#fff}
.pq.current{box-shadow:0 0 0 2px var(--blue);background:var(--blue-bg);color:var(--blue)}
.pq.skipped{background:var(--surface3);color:var(--text3)}
.palette-legend{display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:11px;color:var(--text2)}
.legend-item{display:flex;align-items:center;gap:5px}
.legend-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.submit-btn-wrap{margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border)}

/* Section tabs in exam */
.section-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.5rem}
.sec-tab{padding:6px 14px;border-radius:9999px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--border2);background:none;color:var(--text2);font-family:inherit;transition:all .15s}
.sec-tab.active{background:var(--blue-d);color:#fff;border-color:var(--blue-d)}

/* ══════════════════ RESULT SCREEN ══════════════════ */
.result-wrap{min-height:100vh;background:var(--bg);padding:2rem;display:none}
.result-hero{text-align:center;padding:2rem;background:var(--surface);border-radius:var(--radius-xl);border:1px solid var(--border);margin-bottom:1.5rem;position:relative;overflow:hidden}
.result-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(79,142,247,0.08),transparent 60%);pointer-events:none}
.score-ring{width:140px;height:140px;margin:0 auto 1rem;position:relative}
.score-ring svg{transform:rotate(-90deg)}
.score-ring .ring-bg{fill:none;stroke:var(--surface3);stroke-width:10}
.score-ring .ring-fill{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset 1s ease}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-pct{font-size:28px;font-weight:800}
.score-lbl{font-size:11px;color:var(--text2);font-weight:600}
.result-grade{font-size:22px;font-weight:800;margin-bottom:4px}
.result-sub{font-size:14px;color:var(--text2)}
.result-stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:1.5rem}
.rs-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem;text-align:center}
.rs-val{font-size:22px;font-weight:800;margin-bottom:3px}
.rs-lbl{font-size:11px;color:var(--text2);font-weight:600}
/* Section analysis */
.section-analysis{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-bottom:1.5rem}
.sa-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.1rem}
.sa-title{font-size:13px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.sa-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px;color:var(--text2)}
.sa-row span:last-child{font-weight:600;color:var(--text)}

/* ══════════════════ LEADERBOARD ══════════════════ */
.lb-table{width:100%;border-collapse:collapse}
.lb-table th{text-align:left;padding:10px 14px;border-bottom:1.5px solid var(--border);color:var(--text3);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;background:var(--surface2)}
.lb-table td{padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
.lb-table tbody tr:hover td{background:var(--surface2)}
.lb-table tbody tr.me td{background:var(--blue-bg)}
.rank-badge{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800}
.rank-1{background:linear-gradient(135deg,#F59E0B,#D97706);color:#fff}
.rank-2{background:linear-gradient(135deg,#9CA3AF,#6B7280);color:#fff}
.rank-3{background:linear-gradient(135deg,#B45309,#92400E);color:#fff}
.rank-n{background:var(--surface3);color:var(--text2)}

/* ══════════════════ ADMIN ══════════════════ */
.admin-table{width:100%;border-collapse:collapse;font-size:13px}
.admin-table th{text-align:left;padding:9px 12px;border-bottom:1.5px solid var(--border);color:var(--text3);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;background:var(--surface2)}
.admin-table td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.admin-table tbody tr:hover td{background:var(--surface2)}
.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}
.fg input,.fg select,.fg textarea{padding:10px 12px;background:var(--surface2);border:1.5px solid var(--border2);border-radius:var(--radius);font-size:13px;font-family:inherit;color:var(--text);outline:none;transition:border-color .15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--blue)}
.fg textarea{resize:vertical;min-height:70px}
.fg-full{grid-column:1/-1}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--border)}
.pill{display:inline-flex;align-items:center;padding:2px 9px;border-radius:9999px;font-size:11px;font-weight:600}
.p-full{background:var(--blue-bg);color:var(--blue)}
.p-chapter{background:var(--green-bg);color:var(--green)}
.p-section{background:var(--amber-bg);color:var(--amber)}

/* ══════════════════ MODAL ══════════════════ */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;display:flex;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(4px)}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:1.5rem;width:100%;max-width:660px;max-height:92vh;overflow-y:auto}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}
.modal-hdr h3{font-size:17px;font-weight:800}
.close-btn{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text3);line-height:1;transition:color .12s}
.close-btn:hover{color:var(--text)}

/* ══════════════════ TOAST ══════════════════ */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;padding:12px 20px;border-radius:var(--radius-lg);font-size:13px;font-weight:600;z-index:999;opacity:0;transform:translateY(10px);transition:all .25s;pointer-events:none;max-width:340px;border:1px solid var(--border)}
.toast.show{opacity:1;transform:translateY(0)}
.toast-success{background:#064E3B;color:var(--green);border-color:rgba(52,211,153,0.2)}
.toast-error{background:#7F1D1D;color:var(--red);border-color:rgba(248,113,113,0.2)}
.toast-warn{background:#451A03;color:var(--amber);border-color:rgba(251,191,36,0.2)}

/* ══════════════════ TABS ══════════════════ */
.filter-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem}
.ftab{padding:6px 16px;border-radius:9999px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--border2);background:none;color:var(--text2);font-family:inherit;transition:all .15s}
.ftab.active{background:var(--blue-d);color:#fff;border-color:var(--blue-d)}

/* ══════════════════ REVIEW ══════════════════ */
.review-q{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:12px}
.review-q-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.review-q-num{font-size:11px;font-weight:700;color:var(--text3)}

function loadDB() {

  if (raw) {
    db = JSON.parse(raw);

      users: [...DEFAULT_USERS],
      questions: [...SEED_QUESTIONS],

function setLoginTab(t) {
  loginTab = t;
  document.querySelectorAll('.ltab').forEach(el => el.classList.remove('active'));
  document.getElementById('ltab-' + t).classList.add('active');
  document.getElementById('loginHint').innerHTML = t === 'admin'
    ? 'Admin login: <strong>admin</strong> / <strong>admin123</strong>'
    : 'Student demo: <strong>student1</strong> / <strong>test123</strong>';
}

function doLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  const user = db.users.find(x => x.username === u && x.password === p && x.role === loginTab);
  if (user) {
    currentUser = user;
    sessionStorage.setItem('ssc_session', JSON.stringify(user));
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('userChipName').textContent = user.name.split(' ')[0];
    document.getElementById('userAv').textContent = user.name[0].toUpperCase();
    if (user.role === 'admin') {
      document.querySelectorAll('.admin-only').forEach(el => el.style.display = '');
    }
    goPage('home');
  } else {
    document.getElementById('loginErr').style.display = 'block';
  }
}
function doLogout() {
  sessionStorage.removeItem('ssc_session');
  currentUser = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginWrap').style.display = 'flex';
  document.getElementById('loginPass').value = '';
  document.getElementById('loginErr').style.display = 'none';
}
function checkSession() {
  const raw = sessionStorage.getItem('ssc_session');
  if (raw) {
    currentUser = JSON.parse(raw);
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('userChipName').textContent = currentUser.name.split(' ')[0];
    document.getElementById('userAv').textContent = currentUser.name[0].toUpperCase();
    if (currentUser.role === 'admin') {
      document.querySelectorAll('.admin-only').forEach(el => el.style.display = '');
    }
    goPage('home');
  }
}

// ═══════════════════════════════════════
//   NAVIGATION
// ═══════════════════════════════════════
function goPage(p) {
  currentPage = p;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const nb = document.getElementById('ni-' + p);
  if (nb) nb.classList.add('active');
  const mc = document.getElementById('pageContent');
  if      (p === 'home')           mc.innerHTML = renderHome();
  else if (p === 'tests')          mc.innerHTML = renderTests();
  else if (p === 'results')        mc.innerHTML = renderResults();
  else if (p === 'leaderboard')    mc.innerHTML = renderLeaderboard();
  else if (p === 'admin')          mc.innerHTML = renderAdmin();
  else if (p === 'questions')      mc.innerHTML = renderQuestions();
  else if (p === 'students-admin') mc.innerHTML = renderStudentsAdmin();
}

let toastT;
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast toast-' + type;
  t.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => t.classList.remove('show'), 3000);
}
function subColor(id) { return SUBJECTS.find(s=>s.id===id)?.color || 'var(--text2)'; }
function subBg(id)    { return SUBJECTS.find(s=>s.id===id)?.bg    || 'var(--surface3)'; }
function subLabel(id) { return SUBJECTS.find(s=>s.id===id)?.label || id; }
function getUserResults(testId) {
  return db.results.filter(r => r.username === currentUser.username && (!testId || r.testId === testId));
}
function getBestResult(testId) {
  const rr = getUserResults(testId);
  if (!rr.length) return null;
  return rr.reduce((best, r) => r.score > best.score ? r : best, rr[0]);
}
function typeBadge(type) {
  if (type==='full')    return '<span class="pill p-full">Full Mock</span>';
  if (type==='chapter') return '<span class="pill p-chapter">Chapter</span>';
  return '<span class="pill p-section">Sectional</span>';
}

function startTest(testId) {
  const test = db.tests.find(t => t.id === testId);
  if (!test) return;
  const questions = test.questions.map(qid => db.questions.find(q => q.id === qid)).filter(Boolean);
  if (!questions.length) { showToast('No questions found for this test', 'error'); return; }

  examState = {
    test, questions,
    answers: new Array(questions.length).fill(-1),
    marked:  new Array(questions.length).fill(false),
    currentQ: 0,
    currentSection: 'All',
    timeLeft: test.duration * 60,
    submitted: false,
    startTime: Date.now()
  };

  document.getElementById('app').style.display = 'none';
  document.getElementById('examWrap').style.display = 'flex';
  document.getElementById('resultWrap').style.display = 'none';
  document.getElementById('examTitle').textContent = test.title;
  document.getElementById('examSubInfo').textContent = `${questions.length} Questions · ${test.marks} Marks · -${test.negMarking} Negative Marking`;

  startTimer();
  renderExam();
}

function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    examState.timeLeft--;
    const m = Math.floor(examState.timeLeft / 60);
    const s = examState.timeLeft % 60;
    document.getElementById('timerDisplay').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    const box = document.getElementById('timerBox');
    if (examState.timeLeft <= 300) box.classList.add('danger');
    if (examState.timeLeft <= 0) { clearInterval(timerInterval); submitExam(); }
  }, 1000);
}

function renderExam() {
  renderQuestion();
  renderPalette();
}

function renderQuestion() {
  const { questions, answers, marked, currentQ, test } = examState;
  const q = questions[currentQ];
  const subj = SUBJECTS.find(s => s.id === q.subject) || SUBJECTS[0];

  const panel = document.getElementById('questionPanel');
  panel.innerHTML = `
    <div class="section-tabs">
      ${SUBJECTS.map(s => {
        const hasQ = questions.some(x=>x.subject===s.id);
        if (!hasQ) return '';
        return `<button class="sec-tab ${examState.currentSection===s.id?'active':''}" onclick="jumpToSection('${s.id}')">${s.id}</button>`;
      }).join('')}
      <button class="sec-tab ${examState.currentSection==='All'?'active':''}" onclick="jumpToSection('All')">All</button>
    </div>
    <div class="q-number">Question ${currentQ + 1} of ${questions.length}</div>
    <span class="q-subject-tag" style="background:${subj.bg};color:${subj.color}">${subj.label}</span>
    <div class="q-text">${q.text}</div>
    <div class="options-list">
      ${q.options.map((opt, i) => `
        <div class="option-item ${answers[currentQ]===i?'selected':''}" onclick="selectAnswer(${i})">

        ${marked[currentQ]?'★ Marked for Review':'☆ Mark for Review'}

function renderPalette() {
  const { questions, answers, marked, currentQ } = examState;
  const answeredCount = answers.filter(a=>a!==-1).length;
  const markedCount   = marked.filter(Boolean).length;
  const skipped = questions.length - answeredCount;

  let html = `
    <div style="font-size:13px;font-weight:700;margin-bottom:10px">Question Palette</div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:8px;display:flex;gap:12px;flex-wrap:wrap">
      <span style="color:var(--green);font-weight:600">✓ ${answeredCount} Answered</span>
      <span style="color:var(--text3)">${skipped} Unanswered</span>
      ${markedCount?`<span style="color:var(--purple)">★ ${markedCount} Marked</span>`:''}
    </div>`;

  const sections = [...new Set(questions.map(q=>q.subject))];
  sections.forEach(sec => {
    const secQs = questions.map((q,i) => ({q,i})).filter(({q}) => q.subject===sec);
    const subj = SUBJECTS.find(s=>s.id===sec);
    html += `<div class="palette-section" style="color:${subj?.color||'var(--text3)'}">${sec}</div>
    <div class="palette-grid">
      ${secQs.map(({q,i}) => `<button class="pq ${answers[i]!==-1?'answered':''} ${marked[i]?'review':''} ${i===currentQ?'current':''}" onclick="jumpToQ(${i})">${i+1}</button>`).join('')}
    </div>`;
  });

  html += `
    <div class="palette-legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--green-d)"></div>Answered</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--purple)"></div>Marked</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--surface3)"></div>Not visited</div>
    </div>
    <div class="submit-btn-wrap">
      <button class="btn btn-green" style="width:100%" onclick="confirmSubmitExam()">Submit Test</button>
    </div>`;

  document.getElementById('palettePanelWrap').innerHTML = html;
}

function selectAnswer(i) {
  examState.answers[examState.currentQ] = i;
  renderExam();
}
function clearAnswer() {
  examState.answers[examState.currentQ] = -1;
  renderExam();
}
function toggleMark() {
  examState.marked[examState.currentQ] = !examState.marked[examState.currentQ];
  renderExam();
}
function navQ(dir) {
  const newQ = examState.currentQ + dir;
  if (newQ >= 0 && newQ < examState.questions.length) {
    examState.currentQ = newQ;
    renderExam();
  }
}
function jumpToQ(i) {
  examState.currentQ = i;
  renderExam();
}
function jumpToSection(sec) {
  examState.currentSection = sec;
  if (sec !== 'All') {
    const idx = examState.questions.findIndex(q=>q.subject===sec);
    if (idx !== -1) { examState.currentQ = idx; }
  }
  renderExam();
}

function confirmSubmitExam() {
  const { questions, answers } = examState;
  const answered = answers.filter(a=>a!==-1).length;
  const unanswered = questions.length - answered;
  if (unanswered > 0) {
    if (!confirm(`You have ${unanswered} unanswered question(s). Submit anyway?`)) return;
  }
  submitExam();
}

function submitExam() {
  clearInterval(timerInterval);
  const { test, questions, answers } = examState;
  let correct=0, wrong=0, skipped=0;
  const secStats = {};
  SUBJECTS.forEach(s => secStats[s.id] = {correct:0,wrong:0,skipped:0,total:0});

  questions.forEach((q,i) => {
    const sec = q.subject;
    if (!secStats[sec]) secStats[sec] = {correct:0,wrong:0,skipped:0,total:0};
    secStats[sec].total++;
    if (answers[i] === -1) { skipped++; secStats[sec].skipped++; }
    else if (answers[i] === q.correct) { correct++; secStats[sec].correct++; }
    else { wrong++; secStats[sec].wrong++; }
  });

  const rawScore = correct * 2 - wrong * test.negMarking;
  const score = Math.max(0, rawScore);
  const percent = Math.round((score / test.marks) * 100);
  const timeTaken = Math.round((Date.now() - examState.startTime) / 1000);

  const result = {
    id: Date.now(),
    testId: test.id,
    testTitle: test.title,
    username: currentUser.username,
    userName: currentUser.name,
    correct, wrong, skipped,
    score: Math.round(score * 100) / 100,
    maxScore: test.marks,
    percent,
    secStats,
    timeTaken,
    answers: [...answers],
    timestamp: new Date().toISOString()
  };

  db.results.push(result);
  saveDB();

  document.getElementById('examWrap').style.display = 'none';
  showResult(result);
}

      </div>

  }).join('');

  rw.innerHTML = `
    <div style="max-width:900px;margin:0 auto">
      <div class="result-hero">
        <div class="score-ring">
          <svg width="140" height="140" viewBox="0 0 140 140">
            <circle class="ring-bg" cx="70" cy="70" r="54"/>

          </svg>
          <div class="score-center">
            <div class="score-pct" style="color:${ringColor}">${pct}%</div>

let lbTestFilter = 'all';
function renderLeaderboard() {
  const tests = [{ id:'all', title:'All Tests' }, ...db.tests];
  let lb = [];

  if (lbTestFilter === 'all') {
    const byUser = {};
    db.results.forEach(r => {
      if (!byUser[r.username]) byUser[r.username] = { username:r.username, name:r.userName, totalScore:0, attempts:0, bestPct:0 };
      byUser[r.username].totalScore += r.score;
      byUser[r.username].attempts++;
      byUser[r.username].bestPct = Math.max(byUser[r.username].bestPct, r.percent);
    });
    lb = Object.values(byUser).sort((a,b) => b.bestPct - a.bestPct);
  } else {
    const tid = parseInt(lbTestFilter);
    const byUser = {};
    db.results.filter(r=>r.testId===tid).forEach(r => {
      if (!byUser[r.username] || r.percent > byUser[r.username].percent) {
        byUser[r.username] = { username:r.username, name:r.userName, percent:r.percent, score:r.score, attempts: (byUser[r.username]?.attempts||0)+1 };
      }
    });
    lb = Object.values(byUser).sort((a,b) => b.percent - a.percent);
  }

  return `
  <div class="page-hdr"><h1>Leaderboard</h1><p>All India Rank style rankings</p></div>
  <div class="filter-tabs" style="margin-bottom:1.25rem">
    ${tests.map(t => `<button class="ftab ${lbTestFilter===(t.id==='all'?'all':t.id.toString())?'active':''}" onclick="lbTestFilter='${t.id}';goPage('leaderboard')">${t.id==='all'?'Overall':t.title.substring(0,22)+'...'}</button>`).join('')}
  </div>
  <div class="card">
    ${lb.length === 0
      ? `<div style="text-align:center;padding:2rem;color:var(--text2)">No attempts yet for this test</div>`
      : `<div style="overflow-x:auto"><table class="lb-table">
        <thead><tr><th>Rank</th><th>Student</th><th>Best Score</th><th>Attempts</th><th>Status</th></tr></thead>
        <tbody>
          ${lb.map((u,i) => {
            const isMe = u.username === currentUser.username;
            const pct = lbTestFilter==='all' ? u.bestPct : u.percent;
            return `<tr class="${isMe?'me':''}">
              <td><div class="rank-badge ${i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'rank-n'}">${i+1}</div></td>
              <td><div style="font-weight:600">${u.name}${isMe?' <span style="font-size:10px;background:var(--blue-bg);color:var(--blue);padding:1px 7px;border-radius:9999px;font-weight:700">(You)</span>':''}</div></td>
              <td><span style="font-size:15px;font-weight:800;color:${pct>=60?'var(--green)':pct>=40?'var(--amber)':'var(--red)'}">${pct}%</span></td>
              <td style="color:var(--text2)">${u.attempts || 1}</td>
              <td><span style="font-size:11px;padding:2px 8px;border-radius:9999px;background:${pct>=60?'var(--green-bg)':pct>=40?'var(--amber-bg)':'var(--red-bg)'};color:${pct>=60?'var(--green)':pct>=40?'var(--amber)':'var(--red)'};">${pct>=80?'Excellent':pct>=60?'Good':pct>=40?'Average':'Needs Work'}</span></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table></div>`}
  </div>`;
}

// ═══════════════════════════════════════
//   ADMIN — MANAGE TESTS
// ═══════════════════════════════════════
function renderAdmin() {
  return `
  <div class="page-hdr"><h1>Manage Tests</h1><p>${db.tests.length} tests in system</p></div>
  <div style="display:flex;justify-content:flex-end;margin-bottom:1rem">
    <button class="btn btn-primary" onclick="openAddTestModal()">+ Create New Test</button>
  </div>
  <div class="card">
    <div style="overflow-x:auto"><table class="admin-table">
      <thead><tr><th>ID</th><th>Title</th><th>Type</th><th>Subject</th><th>Questions</th><th>Duration</th><th>Marks</th><th>Attempts</th><th>Actions</th></tr></thead>
      <tbody>
        ${db.tests.map(t => `<tr>
          <td style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text3)">#${t.id}</td>
          <td style="font-weight:600;max-width:200px">${t.title}</td>
          <td>${typeBadge(t.type)}</td>
          <td style="font-size:12px;color:var(--text2)">${t.subject}</td>
          <td style="font-family:'JetBrains Mono',monospace">${t.questions.length}</td>
          <td>${t.duration} min</td>
          <td>${t.marks}</td>
          <td style="color:var(--blue)">${db.results.filter(r=>r.testId===t.id).length}</td>
          <td style="white-space:nowrap">
            <button class="btn btn-ghost btn-sm" onclick="openEditTestModal(${t.id})">Edit</button>
            <button class="btn btn-red btn-sm" onclick="deleteTest(${t.id})" style="margin-left:4px">Delete</button>
          </td>
        </tr>`).join('')}
      </tbody>
    </table></div>
  </div>`;
}

function openAddTestModal() {
  const qList = db.questions.map(q=>`<option value="${q.id}">[${q.subject}] ${q.text.substring(0,60)}...</option>`).join('');
  showModal(`
    <div class="modal-hdr"><h3>Create New Test</h3><button class="close-btn" onclick="closeModal()">×</button></div>
    <div class="form-grid">
      <div class="fg fg-full"><label>Test Title</label><input id="t_title" placeholder="e.g. SSC CGL Full Mock Test 3"></div>
      <div class="fg"><label>Type</label><select id="t_type"><option value="full">Full Mock</option><option value="chapter">Chapter-wise</option><option value="section">Sectional</option></select></div>
      <div class="fg"><label>Subject</label><select id="t_subject"><option value="All">All Subjects</option>${SUBJECTS.map(s=>`<option value="${s.id}">${s.label}</option>`).join('')}</select></div>
      <div class="fg"><label>Duration (minutes)</label><input id="t_duration" type="number" value="60"></div>
      <div class="fg"><label>Total Marks</label><input id="t_marks" type="number" value="200"></div>
      <div class="fg"><label>Negative Marking</label><input id="t_neg" type="number" value="0.5" step="0.25"></div>
      <div class="fg fg-full"><label>Description</label><textarea id="t_desc" rows="2" placeholder="Brief description..."></textarea></div>
      <div class="fg fg-full"><label>Select Questions (Ctrl+click to multi-select)</label><select id="t_qs" multiple style="height:150px">${qList}</select></div>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveNewTest()">Create Test</button>
    </div>`);
}

function saveNewTest() {
  const title = gV('t_title');
  const qSel  = [...document.getElementById('t_qs').selectedOptions].map(o=>parseInt(o.value));
  if (!title) { showToast('Title is required','error'); return; }
  if (!qSel.length) { showToast('Select at least one question','error'); return; }
  const newTest = {
    id: Math.max(0,...db.tests.map(t=>t.id)) + 1,
    title, type: gV('t_type'), subject: gV('t_subject'),
    questions: qSel, duration: parseInt(gV('t_duration'))||60,
    marks: parseInt(gV('t_marks'))||200,
    negMarking: parseFloat(gV('t_neg'))||0.5,
    description: gV('t_desc')
  };
  db.tests.push(newTest);
  saveDB(); closeModal(); goPage('admin');
  showToast('Test created successfully!', 'success');
}

function openEditTestModal(id) {
  const t = db.tests.find(x=>x.id===id);
  if (!t) return;
  const qList = db.questions.map(q=>`<option value="${q.id}" ${t.questions.includes(q.id)?'selected':''}>[${q.subject}] ${q.text.substring(0,60)}...</option>`).join('');
  showModal(`
    <div class="modal-hdr"><h3>Edit Test</h3><button class="close-btn" onclick="closeModal()">×</button></div>
    <div class="form-grid">
      <div class="fg fg-full"><label>Test Title</label><input id="et_title" value="${t.title}"></div>
      <div class="fg"><label>Type</label><select id="et_type"><option value="full" ${t.type==='full'?'selected':''}>Full Mock</option><option value="chapter" ${t.type==='chapter'?'selected':''}>Chapter-wise</option><option value="section" ${t.type==='section'?'selected':''}>Sectional</option></select></div>
      <div class="fg"><label>Duration (min)</label><input id="et_duration" type="number" value="${t.duration}"></div>
      <div class="fg"><label>Total Marks</label><input id="et_marks" type="number" value="${t.marks}"></div>
      <div class="fg"><label>Negative Marking</label><input id="et_neg" type="number" value="${t.negMarking}" step="0.25"></div>
      <div class="fg fg-full"><label>Questions (Ctrl+click)</label><select id="et_qs" multiple style="height:150px">${qList}</select></div>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEditTest(${id})">Save Changes</button>
    </div>`);
}

function saveEditTest(id) {
  const idx = db.tests.findIndex(x=>x.id===id);
  if (idx<0) return;
  const qSel = [...document.getElementById('et_qs').selectedOptions].map(o=>parseInt(o.value));
  db.tests[idx] = { ...db.tests[idx],
    title: gV('et_title'), type: gV('et_type'),
    duration: parseInt(gV('et_duration'))||60,
    marks: parseInt(gV('et_marks'))||200,
    negMarking: parseFloat(gV('et_neg'))||0.5,
    questions: qSel
  };
  saveDB(); closeModal(); goPage('admin');
  showToast('Test updated!', 'success');
}

function deleteTest(id) {
  if (!confirm('Delete this test? All attempts will also be removed.')) return;
  db.tests = db.tests.filter(t=>t.id!==id);
  db.results = db.results.filter(r=>r.testId!==id);
  saveDB(); goPage('admin');
  showToast('Test deleted', 'warn');
}

// ═══════════════════════════════════════
//   ADMIN — QUESTION BANK
// ═══════════════════════════════════════
let qFilter = 'All';
function renderQuestions() {
  const filtered = qFilter==='All' ? db.questions : db.questions.filter(q=>q.subject===qFilter);
  return `
  <div class="page-hdr"><h1>Question Bank</h1><p>${db.questions.length} questions total</p></div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:8px">
    <div class="filter-tabs" style="margin:0">
      <button class="ftab ${qFilter==='All'?'active':''}" onclick="qFilter='All';goPage('questions')">All (${db.questions.length})</button>
      ${SUBJECTS.map(s=>`<button class="ftab ${qFilter===s.id?'active':''}" onclick="qFilter='${s.id}';goPage('questions')">${s.id} (${db.questions.filter(q=>q.subject===s.id).length})</button>`).join('')}
    </div>
    <button class="btn btn-primary" onclick="openAddQModal()">+ Add Question</button>
  </div>
  <div class="card">
    <div style="overflow-x:auto"><table class="admin-table">
      <thead><tr><th>ID</th><th>Subject</th><th>Question</th><th>Options</th><th>Correct</th><th>Actions</th></tr></thead>
      <tbody>
        ${filtered.map(q=>`<tr>
          <td style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3)">${q.id}</td>
          <td><span style="font-size:11px;font-weight:700;padding:3px 8px;border-radius:9999px;background:${subBg(q.subject)};color:${subColor(q.subject)}">${q.subject}</span></td>
          <td style="max-width:280px;font-size:12px">${q.text.substring(0,80)}${q.text.length>80?'...':''}</td>
          <td style="font-size:11px;color:var(--text2)">${q.options.length} options</td>
          <td style="font-family:'JetBrains Mono',monospace;color:var(--green);font-weight:700">${String.fromCharCode(65+q.correct)}</td>
          <td style="white-space:nowrap">
            <button class="btn btn-ghost btn-sm" onclick="openEditQModal(${q.id})">Edit</button>
            <button class="btn btn-red btn-sm" onclick="deleteQ(${q.id})" style="margin-left:4px">Del</button>
          </td>
        </tr>`).join('')}
      </tbody>
    </table></div>
  </div>`;
}

function openAddQModal() {
  showModal(`
    <div class="modal-hdr"><h3>Add Question</h3><button class="close-btn" onclick="closeModal()">×</button></div>
    <div class="form-grid">
      <div class="fg"><label>Subject</label><select id="q_sub">${SUBJECTS.map(s=>`<option value="${s.id}">${s.label}</option>`).join('')}</select></div>
      <div class="fg"><label>Correct Answer</label><select id="q_correct"><option value="0">A</option><option value="1">B</option><option value="2">C</option><option value="3">D</option></select></div>
      <div class="fg fg-full"><label>Question Text</label><textarea id="q_text" rows="3" placeholder="Enter the question..."></textarea></div>
      <div class="fg"><label>Option A</label><input id="q_oa" placeholder="Option A"></div>
      <div class="fg"><label>Option B</label><input id="q_ob" placeholder="Option B"></div>
      <div class="fg"><label>Option C</label><input id="q_oc" placeholder="Option C"></div>
      <div class="fg"><label>Option D</label><input id="q_od" placeholder="Option D"></div>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveNewQ()">Add Question</button>
    </div>`);
}

function saveNewQ() {
  const text = gV('q_text'), oa=gV('q_oa'), ob=gV('q_ob'), oc=gV('q_oc'), od=gV('q_od');
  if (!text||!oa||!ob||!oc||!od) { showToast('All fields required','error'); return; }
  const newQ = {
    id: Math.max(0,...db.questions.map(q=>q.id))+1,
    subject: gV('q_sub'), text,
    options: [oa,ob,oc,od],
    correct: parseInt(gV('q_correct'))
  };
  db.questions.push(newQ);
  saveDB(); closeModal(); goPage('questions');
  showToast('Question added!','success');
}

function openEditQModal(id) {
  const q = db.questions.find(x=>x.id===id);
  if (!q) return;
  showModal(`
    <div class="modal-hdr"><h3>Edit Question</h3><button class="close-btn" onclick="closeModal()">×</button></div>
    <div class="form-grid">
      <div class="fg"><label>Subject</label><select id="eq_sub">${SUBJECTS.map(s=>`<option value="${s.id}" ${q.subject===s.id?'selected':''}>${s.label}</option>`).join('')}</select></div>
      <div class="fg"><label>Correct Answer</label><select id="eq_correct">${['A','B','C','D'].map((l,i)=>`<option value="${i}" ${q.correct===i?'selected':''}>${l}</option>`).join('')}</select></div>
      <div class="fg fg-full"><label>Question Text</label><textarea id="eq_text" rows="3">${q.text}</textarea></div>
      <div class="fg"><label>Option A</label><input id="eq_oa" value="${q.options[0]}"></div>
      <div class="fg"><label>Option B</label><input id="eq_ob" value="${q.options[1]}"></div>
      <div class="fg"><label>Option C</label><input id="eq_oc" value="${q.options[2]}"></div>
      <div class="fg"><label>Option D</label><input id="eq_od" value="${q.options[3]}"></div>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEditQ(${id})">Save</button>
    </div>`);
}

function saveEditQ(id) {
  const idx = db.questions.findIndex(x=>x.id===id);
  if (idx<0) return;
  db.questions[idx] = { ...db.questions[idx],
    subject: gV('eq_sub'), text: gV('eq_text'),
    options: [gV('eq_oa'),gV('eq_ob'),gV('eq_oc'),gV('eq_od')],
    correct: parseInt(gV('eq_correct'))
  };
  saveDB(); closeModal(); goPage('questions');
  showToast('Question updated!','success');
}

function deleteQ(id) {
  if (!confirm('Delete this question?')) return;
  db.questions = db.questions.filter(q=>q.id!==id);
  db.tests.forEach(t => { t.questions = t.questions.filter(qid=>qid!==id); });
  saveDB(); goPage('questions');
  showToast('Question deleted','warn');
}

// ═══════════════════════════════════════
//   ADMIN — STUDENT ACCOUNTS
// ═══════════════════════════════════════
function renderStudentsAdmin() {
  const students = db.users.filter(u=>u.role==='student');
  return `
  <div class="page-hdr"><h1>Student Accounts</h1><p>${students.length} registered students</p></div>
  <div style="display:flex;justify-content:flex-end;margin-bottom:1rem">
    <button class="btn btn-primary" onclick="openAddStudentModal()">+ Add Student Account</button>
  </div>
  <div class="card">
    <table class="admin-table">
      <thead><tr><th>Username</th><th>Name</th><th>Tests Attempted</th><th>Best Score</th><th>Actions</th></tr></thead>
      <tbody>
        ${students.map(u => {
          const rr = db.results.filter(r=>r.username===u.username);
          const best = rr.length ? Math.max(...rr.map(r=>r.percent)) : 0;
          return `<tr>
            <td style="font-family:'JetBrains Mono',monospace;font-size:12px">${u.username}</td>
            <td style="font-weight:600">${u.name}</td>
            <td style="color:var(--blue)">${rr.length}</td>
            <td style="color:var(--green);font-weight:700">${best?best+'%':'—'}</td>
            <td>
              <button class="btn btn-red btn-sm" onclick="deleteStudent('${u.username}')">Remove</button>
            </td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>`;
}

function openAddStudentModal() {
  showModal(`
    <div class="modal-hdr"><h3>Add Student Account</h3><button class="close-btn" onclick="closeModal()">×</button></div>
    <div class="form-grid">
      <div class="fg"><label>Full Name</label><input id="su_name" placeholder="Student full name"></div>
      <div class="fg"><label>Username</label><input id="su_user" placeholder="Login username"></div>
      <div class="fg fg-full"><label>Password</label><input id="su_pass" type="password" placeholder="Set password"></div>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveNewStudent()">Create Account</button>
    </div>`);
}

function saveNewStudent() {
  const name=gV('su_name'), user=gV('su_user'), pass=gV('su_pass');
  if (!name||!user||!pass) { showToast('All fields required','error'); return; }
  if (db.users.find(u=>u.username===user)) { showToast('Username already exists','error'); return; }
  db.users.push({ username:user, password:pass, role:'student', name });
  saveDB(); closeModal(); goPage('students-admin');
  showToast('Student account created!','success');
}

function deleteStudent(username) {
  if (!confirm('Remove this student account?')) return;
  db.users = db.users.filter(u=>u.username!==username);
  saveDB(); goPage('students-admin');
  showToast('Account removed','warn');
}

// ═══════════════════════════════════════
//   MODAL
// ═══════════════════════════════════════
function showModal(html) {
  const existing = document.getElementById('globalModal');
  if (existing) existing.remove();
  const div = document.createElement('div');
  div.id = 'globalModal';
  div.className = 'modal-ov';
  div.onclick = e => { if(e.target===div) closeModal(); };
  div.innerHTML = `<div class="modal">${html}</div>`;
  document.body.appendChild(div);
}
function closeModal() {
  const el = document.getElementById('globalModal');
  if (el) el.remove();
}

// ═══════════════════════════════════════
loadDB();
checkSession();
</script>
